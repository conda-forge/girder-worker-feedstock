schema_version: 1

context:
  name: girder-worker
  version: "5.0.6"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/girder_worker-${{ version }}.tar.gz
  sha256: 89a6fdbe4a91e89c9b3ce73c3fbcc379d644dc5ef3b1b27ccbbc2897965442fe

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - setuptools-scm
    - pip
  run:
    - python >=${{ python_min }}
    - pyyaml >=4.2b1
    - jinja2 >=2.10.1
    - urllib3 >=1.26.8
    - celery
    - girder-client >=5.0.0a5
    - pymongo >=3
    - requests >=2.20.0
    - setuptools-scm
    - stevedore
    - jsonpickle
    - docker-py >=2.6.0

tests:
  - python:
      imports:
        - girder_worker
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Batch execution engine built on celery.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/girder/girder_worker

extra:
  recipe-maintainers:
    - jan-janssen
