{% set name = "girder-worker" %}
{% set version = "5.0.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/girder_worker-{{ version }}.tar.gz
  sha256: 078b6f4f8e7fdac6bc700c7367ebfdbbee3a258c0cc0602331b06b3022a04eea

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - setuptools-scm
    - pip
  run:
    - python >={{ python_min }}
    - pyyaml >=4.2b1
    - jinja2 >=2.10.1
    - urllib3 >=1.26.8
    - celery
    - girder-client >=5.0.0a5
    - pymongo >=3
    - requests >=2.20.0
    - setuptools-scm
    - stevedore
    - jsonpickle
    - docker-py >=2.6.0

test:
  imports:
    - girder_worker
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/girder/girder_worker
  summary: Batch execution engine built on celery.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
